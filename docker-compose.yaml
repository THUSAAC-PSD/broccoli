  #     BROCCOLI__STORAGE__DATA_DIR: "/data"
  #     RUST_LOG: "info"
  #   volumes:
  #     - worker_data:/data

  seaweedfs:
    image: chrislusf/seaweedfs:4.15
    command:
      [
        'server',
        '-dir=/data',
        '-s3',
        '-s3.config=/etc/seaweedfs/s3.json',
        '-ip=seaweedfs',
      ]
    ports:
      - '9333:9333'
      - '8333:8333'
    volumes:
      - seaweed_data:/data
      - ./config/seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro

volumes:
  pg_data:
  redis_data:
  # worker_data:
  seaweed_data:
