name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  RUST_BACKTRACE: short

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build plugin WASM artefacts
        run: ./scripts/build-plugins.sh

      - name: Test
        run: cargo test --workspace --locked

      - name: Documentation
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build
        run: pnpm build

  release-bundled-feature:
    name: Release / bundled-stress-test feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-bundled-feature

      - name: Stage fixture binaries as embedded
        run: |
          mkdir -p packages/server/embedded/stress-test
          cp packages/server/tests/fixtures/embedded-stress-test/* \
             packages/server/embedded/stress-test/

      - name: Build (bundled feature)
        run: cargo build -p server --features bundled-stress-test --locked

      # The vanilla `Rust` job already runs the full server test suite. Here we
      # only re-run the tests that exercise the cfg-gated `/downloads` routes.
      - name: Test downloads endpoint
        run: cargo test -p server --features bundled-stress-test --locked --test integration -- downloads
