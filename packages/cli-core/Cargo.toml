[package]
name = "broccoli-cli-core"
version = "0.1.0"
description = "Shared CLI utilities for Broccoli (auth, config, API client)"
license = "MIT"
repository = "https://github.com/THUSAAC-PSD/broccoli"
edition = "2024"
rust-version = "1.85"

[dependencies]
anyhow.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
toml.workspace = true
# rustls with bundled webpki roots avoids an OpenSSL dependency.
# platform-verifier lets users opt into the OS trust store via BROCCOLI_TLS=system.
ureq = { version = "3", features = ["json", "platform-verifier"] }
dirs.workspace = true
console = "0.15"
rand.workspace = true
http = "1"
ratatui.workspace = true
crossterm.workspace = true

[dev-dependencies]
tempfile = "3"
