[package]
name = "broccoli-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "broccoli"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
toml.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
clap = { version = "4", features = ["derive", "env"] }
dialoguer = "0.11"
console = "0.15"
notify.workspace = true
reqwest = { version = "0.12", features = ["blocking", "multipart", "json"] }
flate2.workspace = true
tar.workspace = true
dirs.workspace = true
open.workspace = true
rand.workspace = true
ctrlc = "3"
libc = "0.2"
shlex = "1"
