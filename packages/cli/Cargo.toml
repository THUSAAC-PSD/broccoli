[package]
name = "broccoli-cli"
version = "0.1.2"
description = "CLI for scaffolding and building Broccoli plugins"
license = "MIT"
repository = "https://github.com/THUSAAC-PSD/broccoli"
readme = "README.md"
keywords = ["broccoli", "cli", "plugin", "wasm", "online-judge"]
categories = ["command-line-utilities", "development-tools"]
edition = "2024"
rust-version = "1.85"

[[bin]]
name = "broccoli"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
toml.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
clap = { version = "4", features = ["derive", "env"] }
dialoguer = "0.11"
console = "0.15"
notify.workspace = true
reqwest = { version = "0.12", features = ["blocking", "multipart", "json"] }
flate2.workspace = true
tar.workspace = true
dirs.workspace = true
open.workspace = true
rand.workspace = true
ctrlc = "3"
libc = "0.2"
shlex = "1"
