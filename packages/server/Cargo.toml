[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow.workspace = true
argon2.workspace = true
broccoli-server-sdk.workspace = true
worker = { path = "../worker" }
common = { workspace = true, features = ["sea-orm", "object-storage"] }
crossbeam.workspace = true
dashmap.workspace = true
mq.workspace = true
axum = { workspace = true, features = ["multipart"] }
chrono.workspace = true
config.workspace = true
extism.workspace = true
jsonwebtoken.workspace = true
plugin-core.workspace = true
rand.workspace = true
sea-orm = { workspace = true, features = [
  "runtime-tokio-rustls",
  "sqlx-postgres",
  "macros",
  "schema-sync",
  "entity-registry",
  "with-uuid",
] }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
time.workspace = true
tokio.workspace = true
tokio-util = { version = "0.7", features = ["io"] }
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
utoipa.workspace = true
utoipa-axum.workspace = true
utoipa-scalar.workspace = true
utoipa-swagger-ui.workspace = true
uuid.workspace = true
zip.workspace = true
mime_guess.workspace = true
matchit.workspace = true
flate2.workspace = true
tar.workspace = true
hex.workspace = true
axum_typed_multipart.workspace = true
axum-extra = { workspace = true, features = ["cookie"] }

[dev-dependencies]
async-trait.workspace = true
libc = "0.2"
reqwest = { version = "0.12", features = ["cookies", "json", "multipart"] }
sea-orm = { workspace = true, features = ["mock"] }
tempfile = "3"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }

[target.'cfg(unix)'.dev-dependencies]
testcontainers = { version = "0.23", features = ["watchdog"] }
