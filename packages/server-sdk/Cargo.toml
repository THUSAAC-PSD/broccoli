[package]
name = "broccoli-server-sdk"
version = "0.1.1"
edition = "2024"
description = "SDK for building Broccoli online judge WASM plugins"
license = "MIT"
repository = "https://github.com/THUSAAC-PSD/broccoli"
readme = "README.md"
keywords = ["broccoli", "online-judge", "wasm", "plugin", "sdk"]
categories = ["wasm", "development-tools"]

[features]
default = []
guest = ["dep:extism-pdk"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
extism-pdk = { version = "1.0", optional = true }
