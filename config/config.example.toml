[server]
host = "127.0.0.1"
port = 3000

[server.cors]
allow_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]
max_age = 3600

[worker]
id = "worker-1"
sandbox_backend = "isolate"
isolate_bin = "isolate"
enable_cgroups = true

[database]
url = "postgres://postgres:broccoli_pg_secret@localhost:5432/broccoli"

[mq]
enabled = true
url = "redis://:broccoli_redis_secret@localhost:6379"
pool_size = 5
queue_name = "judge_jobs"
result_queue_name = "judge_results"
dlq_queue_name = "judge_jobs_dlq"

[mq.dlq]
max_retries = 3
base_delay_ms = 1000
max_delay_ms = 60000
stuck_job_timeout_secs = 900
stuck_job_scan_interval_secs = 60
retry_cleanup_interval_secs = 300
retry_max_age_secs = 600

[auth]
jwt_secret = "generate-a-long-random-string-here"

[storage]
backend = "filesystem"
data_dir = "./data"
max_blob_size = 134217728 # 128MB

# S3-compatible storage settings (used when storage.backend = "object_storage")
[storage.object_storage]
bucket = "broccoli-blobs"
region = "us-east-1"
endpoint = "http://127.0.0.1:8333"
access_key = "broccoli_s3_access"
secret_key = "broccoli_s3_secret"
path_style = true
temp_dir = ""

[plugin]
plugins_dir = "./plugins"
enable_wasi = true
