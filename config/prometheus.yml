global:
  scrape_interval: 15s

scrape_configs:
  - job_name: broccoli-server
    static_configs:
      - targets:
          - host.docker.internal:3000
    metrics_path: /metrics

  # Worker metrics endpoint is not yet implemented. Uncomment when
  # the worker exposes /metrics on port 9091.
  # - job_name: broccoli-worker
  #   static_configs:
  #     - targets:
  #         - host.docker.internal:9091
  #   metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
